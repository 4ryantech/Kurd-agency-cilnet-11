    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #000;
        }

        body { 
            background-image: 
                radial-gradient(circle at 50% -20%, #1a3a5f, transparent),
                radial-gradient(circle at 0% 100%, #0a1520, transparent);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: #fff;
        }

        .main-wrapper {
            width: 100%; 
            height: 100%; 
            max-width: 500px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
            text-align: center;
            position: relative;
        }

        .top-brand-small {
            font-size: 0.55rem;
            font-weight: 800;
            color: #4facfe;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.5;
        }

        /* لۆگۆی وەتسئەپی سەرەوە - بە لێدان دەجوڵێت */
        .call-icon-main {
            font-size: 4.5rem;
            color: #25D366;
            filter: drop-shadow(0 0 15px rgba(37, 211, 102, 0.4));
            animation: mainPulse 2s infinite ease-in-out;
            margin-top: 10px;
        }

        @keyframes mainPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(37, 211, 102, 0.4)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 25px rgba(37, 211, 102, 0.7)); }
        }

        .instruction {
            font-size: 1.3rem;
            font-weight: 800;
            margin-top: 10px;
        }

        .scroll-icon {
            font-size: 1.8rem;
            color: #4facfe;
            margin-top: 5px;
            animation: moveDown 1.5s infinite ease-in-out;
        }

        @keyframes moveDown {
            0%, 100% { transform: translateY(0); opacity: 0.3; }
            50% { transform: translateY(10px); opacity: 1; }
        }

        /* دوگمەی وەتسئەپ - بە لەرزین دەجوڵێت */
        .link-item {
            display: flex; 
            align-items: center;
            padding: 20px;
            background: rgba(37, 211, 102, 0.15);
            border: 1px solid rgba(37, 211, 102, 0.3);
            border-radius: 25px;
            text-decoration: none;
            color: #fff;
            font-weight: 800;
            font-size: 1.2rem;
            animation: shakeBtn 5s infinite;
        }

        @keyframes shakeBtn {
            0%, 90%, 100% { transform: rotate(0); }
            92% { transform: rotate(2deg); }
            94% { transform: rotate(-2deg); }
            96% { transform: rotate(2deg); }
            98% { transform: rotate(-2deg); }
        }

        /* لۆگۆی ناو دوگمەکەش دەجوڵێت */
        .link-item i { 
            font-size: 2.2rem; 
            margin-left: 12px; 
            color: #25D366;
            animation: iconPulse 2s infinite;
        }

        @keyframes iconPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .link-item span { flex-grow: 1; text-align: right; }

        /* فۆتەری بچوک و ناسک */
        .footer-section {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            text-decoration: none;
            display: inline-block;
            margin: 0 auto 10px auto;
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: fit-content;
        }

        .footer-brand { 
            font-size: 0.85rem; 
            font-weight: 900; 
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .footer-slogan { 
            font-size: 0.65rem; 
            color: #aaa; 
            margin-bottom: 3px;
        }

        .contact-us-text {
            font-size: 0.6rem;
            color: #4facfe;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="top-brand-small">Kurd Agency</div>

        <div class="header-section">
            <div class="call-icon-main"><i class="fab fa-whatsapp"></i></div>
            <p class="instruction">بۆ پەیوەندی کردن ئێرە دابگرە</p>
            <div class="scroll-icon"><i class="fas fa-chevron-down"></i></div>
        </div>

        <div class="center-content">
            <a href="https://wa.me/9647700659034" class="link-item" onclick="ttq.track('Contact');">
                <i class="fab fa-whatsapp"></i> <span>وەتسئەپ</span>
            </a>
        </div>

        <a href="https://wa.me/9647700659034" class="footer-section">
            <div class="footer-brand">KURD AGENCY</div>
            <p class="footer-slogan">گەورەکردنی کارەکەت لەگەڵ ئێمە ئاسانە</p>
            <p class="contact-us-text">contact us</p>
        </a>
    </div>

</body>
</html>
